name: Kbot CI/CD

on:
  push:
    branches: [ develop ]

env:
  TARGETOS: linux
  TARGETARCH: amd64
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPOSITORY: den-vasyliev/kbot

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout develop branch
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: develop
          fetch-depth: 0

      # 2️⃣ Set IMAGE_TAG
      - name: Set image tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v1.0.0-${SHORT_SHA}-${TARGETOS}-${TARGETARCH}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG is $IMAGE_TAG"

      # 3️⃣ Log in to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Build and push Docker image
      - name: Build & Push Docker image
        run: |
          docker buildx build \
            --platform ${{ env.TARGETOS }}/$TARGETARCH \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG} \
            --push \
            .

      # 5️⃣ Update Helm values
      - name: Update Helm chart values
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          curl -L https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq e -i '.image.tag = strenv(IMAGE_TAG) | .image.os = strenv(TARGETOS) | .image.arch = strenv(TARGETARCH)' helm/values.yaml

      # 6️⃣ Commit and push Helm changes
      - name: Commit Helm chart update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/values.yaml
          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commit"
          git push origin develop