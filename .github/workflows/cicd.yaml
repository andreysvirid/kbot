name: kbot-CI-CD

on:
  push:
    branches: [ develop ]

env:
  TARGETARCH: amd64
  TARGETOS: linux
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPOSITORY: andreysvirid/kbot

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout develop into unique tmp dir
      - name: Checkout develop
        run: |
          REPO_DIR="/tmp/kbot-$(date +%s%N)"
          git clone --depth 1 --branch develop https://github.com/den-vasyliev/kbot.git "$REPO_DIR"
          echo "REPO_DIR=$REPO_DIR" >> $GITHUB_ENV
        shell: bash

      # 2️⃣ Run tests
      - name: Run tests
        run: |
          cd $REPO_DIR
          make test

      # 3️⃣ Log in to GHCR
      - name: GHCR login
        uses: docker/login-action@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Build & Push Docker image
      - name: Build & Push Docker image
        run: |
          cd $REPO_DIR
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v1.0.0-${SHORT_SHA}-${TARGETOS}-${TARGETARCH}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          docker buildx build \
            --platform $TARGETOS/$TARGETARCH \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG} \
            --push \
            .

      # 5️⃣ Clean
      - name: Clean
        run: |
          cd $REPO_DIR
          make clean TARGETARCH=$TARGETARCH

  cd:
    name: CD
    needs: ci
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout develop
      - name: Checkout develop
        run: |
          REPO_DIR="/tmp/kbot-$(date +%s%N)"
          git clone --depth 1 --branch develop https://github.com/den-vasyliev/kbot.git "$REPO_DIR"
          echo "REPO_DIR=$REPO_DIR" >> $GITHUB_ENV
        shell: bash

      # 2️⃣ Update Helm values
      - name: Update Helm chart
        uses: mikefarah/yq@master
        with:
          cmd: yq -i '.image.tag=strenv(IMAGE_TAG) | .image.arch=strenv(TARGETARCH)' ${{ env.REPO_DIR }}/helm/values.yaml

      # 3️⃣ Commit Helm chart changes
      - name: Commit Helm chart changes
        run: |
          cd $REPO_DIR
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add helm/values.yaml
          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commit"
          git push origin develop